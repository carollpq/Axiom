name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false # Never cancel an in-progress migration

jobs:
  migrate:
    name: DB migrate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Push schema to NeonDB
        run: npx drizzle-kit push --config drizzle.config.ts

  # Vercel deploys automatically via Git integration.
  # No explicit deploy step needed — Vercel triggers on push to main.
  # Configure your Vercel project at https://vercel.com/dashboard.
