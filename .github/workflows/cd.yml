name: CD

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: DB migrate
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push schema to NeonDB
        run: npx drizzle-kit push --config drizzle.config.ts

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Replace the step below with your deployment target ──────────────
