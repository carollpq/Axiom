name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          npm ci
          cd contracts && npm ci

  typecheck:
    name: Type-check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Compile contracts (generates TypeChain types)
        run: cd contracts && npx hardhat compile

      - run: npx tsc --noEmit

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - run: npm run lint

  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
      NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_PRIVATE_KEY: ${{ secrets.AUTH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - run: npm run build
