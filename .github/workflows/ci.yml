name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  ci:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest

    env:
      # Required by next build — values don't need to be real for a build check
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
      NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
      # Needed so drizzle/neon imports resolve at build time
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Auth key (used at runtime only, but imported at module level)
      AUTH_PRIVATE_KEY: ${{ secrets.AUTH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
