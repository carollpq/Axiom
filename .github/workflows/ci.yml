name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          npm ci
          cd contracts && npm ci

  typecheck:
    name: Type-check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Compile contracts (generates TypeChain types)
        run: cd contracts && npx hardhat compile

      - run: npx tsc --noEmit

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - run: npm run lint

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - run: npm test

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
      NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
    
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_PRIVATE_KEY: ${{ secrets.AUTH_PRIVATE_KEY }}
    
      THIRDWEB_PROJECT_SECRET_KEY: ${{ secrets.THIRDWEB_PROJECT_SECRET_KEY }}
    
      HEDERA_NETWORK: ${{ secrets.HEDERA_NETWORK }}
      HEDERA_OPERATOR_ID: ${{ secrets.HEDERA_OPERATOR_ID }}
      HEDERA_OPERATOR_KEY: ${{ secrets.HEDERA_OPERATOR_KEY }}
    
      HCS_TOPIC_PAPERS: ${{ secrets.HCS_TOPIC_PAPERS }}
      HCS_TOPIC_CONTRACTS: ${{ secrets.HCS_TOPIC_CONTRACTS }}
      HCS_TOPIC_SUBMISSIONS: ${{ secrets.HCS_TOPIC_SUBMISSIONS }}
      HCS_TOPIC_CRITERIA: ${{ secrets.HCS_TOPIC_CRITERIA }}
      HCS_TOPIC_REVIEWS: ${{ secrets.HCS_TOPIC_REVIEWS }}
      HCS_TOPIC_DECISIONS: ${{ secrets.HCS_TOPIC_DECISIONS }}
      HCS_TOPIC_EARNINGS: ${{ secrets.HCS_TOPIC_EARNINGS }}
      HTS_REPUTATION_TOKEN_ID: ${{ secrets.HTS_REPUTATION_TOKEN_ID }}
    
      NEXT_PUBLIC_LIT_NETWORK: ${{ secrets.NEXT_PUBLIC_LIT_NETWORK }}
    
      PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
      PINATA_JWT: ${{ secrets.PINATA_JWT }}
      PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
      PINATA_GATEWAY_URL: ${{ secrets.PINATA_GATEWAY_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            contracts/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'contracts/package-lock.json') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - run: npm run build
